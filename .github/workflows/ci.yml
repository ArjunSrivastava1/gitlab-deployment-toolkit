name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Download dependencies
      run: go mod download
    - name: Check formatting
      run: |
        go fmt ./...
        git diff --exit-code
    - name: Run go vet
      run: go vet ./...

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Download dependencies
      run: go mod download
    - name: Run tests
      run: go test -v ./...

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Download dependencies
      run: go mod download
    - name: Build for Linux
      run: |
        GOOS=linux GOARCH=amd64 go build -ldflags="-X main.Version=${GITHUB_SHA::8}" -o gdt-linux-amd64 ./cmd/gitlab-deployment-toolkit
    - name: Build for macOS
      run: |
        GOOS=darwin GOARCH=amd64 go build -ldflags="-X main.Version=${GITHUB_SHA::8}" -o gdt-darwin-amd64 ./cmd/gitlab-deployment-toolkit
    - name: Build for Windows
      run: |
        GOOS=windows GOARCH=amd64 go build -ldflags="-X main.Version=${GITHUB_SHA::8}" -o gdt-windows-amd64.exe ./cmd/gitlab-deployment-toolkit
    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          gdt-linux-amd64
          gdt-darwin-amd64
          gdt-windows-amd64.exe

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: gitlab-deployment-toolkit:latest
        load: true
    - name: Test Docker image
      run: |
        docker run --rm gitlab-deployment-toolkit:latest -version

  kubernetes-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        config: kind-config.yaml
    - name: Deploy test nginx
      run: |
        kubectl create deployment nginx-test --image=nginx --replicas=2
        kubectl wait --for=condition=available deployment/nginx-test --timeout=60s
    - name: Build GDT
      run: go build -o gdt ./cmd/gitlab-deployment-toolkit
    - name: Test GDT
      run: |
        ./gdt -list-deployments default
        ./gdt -check-k8s default/nginx-test

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Install gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
    - name: Run gosec
      run: gosec ./...
    - name: Run Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

  release:
    runs-on: ubuntu-latest
    needs: [kubernetes-tests, security-scan]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build all binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        GOOS=linux GOARCH=amd64 go build -ldflags="-X main.Version=${VERSION}" -o gdt-linux-amd64 ./cmd/gitlab-deployment-toolkit
        GOOS=darwin GOARCH=amd64 go build -ldflags="-X main.Version=${VERSION}" -o gdt-darwin-amd64 ./cmd/gitlab-deployment-toolkit
        GOOS=windows GOARCH=amd64 go build -ldflags="-X main.Version=${VERSION}" -o gdt-windows-amd64.exe ./cmd/gitlab-deployment-toolkit
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          gdt-linux-amd64
          gdt-darwin-amd64
          gdt-windows-amd64.exe
        generate_release_notes: true